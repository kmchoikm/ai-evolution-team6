<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunFit - 사이즈 핏 가이드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <a href="home.html" class="header-back">← 홈</a>
    <h1>📏 사이즈 핏 가이드</h1>
    <p class="tagline">브랜드 간 사이즈 편차를 반영해 드립니다</p>
  </header>

  <main class="container">

    <div class="intro">
      <p>지금 신는 신발 사이즈를 입력하면<br>다른 브랜드/모델의 권장 사이즈를 알려드립니다</p>
    </div>

    <form id="size-form">

      <!-- 현재 신발 -->
      <div class="question">
        <h3>현재 신발 <span class="required">*</span></h3>
        <div class="autocomplete-wrap">
          <input type="text" id="from-shoe-input" class="search-input" placeholder="브랜드 또는 모델 입력 (예: 아식스 카야노)"
            autocomplete="off" oninput="handleFromSearch()" />
          <div id="from-autocomplete" class="autocomplete-dropdown" style="display:none;"></div>
        </div>
        <input type="hidden" id="from-brand" />
        <input type="hidden" id="from-model" />
        <p id="from-selected-label" class="selected-label" style="display:none;"></p>

        <div class="size-input-row" style="margin-top:12px;">
          <label class="size-label">현재 사이즈</label>
          <input type="number" id="from-size-mm" class="number-input" placeholder="예: 260" min="200" max="320" />
          <span class="input-unit">mm</span>
        </div>
      </div>

      <!-- 변환할 신발 -->
      <div class="question">
        <h3>변환할 신발 <span class="required">*</span></h3>
        <div class="autocomplete-wrap">
          <input type="text" id="to-shoe-input" class="search-input" placeholder="브랜드 또는 모델 입력 (예: 뉴발란스 페이퍼)"
            autocomplete="off" oninput="handleToSearch()" />
          <div id="to-autocomplete" class="autocomplete-dropdown" style="display:none;"></div>
        </div>
        <input type="hidden" id="to-brand" />
        <input type="hidden" id="to-model" />
        <p id="to-selected-label" class="selected-label" style="display:none;"></p>
      </div>

      <!-- 에러 -->
      <div id="errors" class="errors" style="display:none;"></div>

      <button type="submit" id="convert-btn" class="btn-submit">변환하기 →</button>
    </form>

    <!-- 결과 영역 -->
    <div id="result-container"></div>

  </main>

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay" class="loading-overlay" style="display:none;">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>사이즈를 계산하는 중...</p>
    </div>
  </div>

  <footer class="footer">
    <p>powered by KAIST IMMS 이준호 · 김영권 · 박영민 · 최규민</p>
  </footer>

  <script src="size.js"></script>
</body>
</html>
