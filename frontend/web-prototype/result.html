<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunFit - 추천 결과</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <a href="index.html" class="header-back">← 홈</a>
    <h1><a href="index.html" class="header-logo">🏃 RunFit</a></h1>
    <p class="tagline">AI가 추천한 러닝화입니다</p>
  </header>

  <main class="container">
    <!-- 프로필 요약 태그 -->
    <div class="profile-summary" id="profile-summary"></div>

    <!-- 추천 결과 카드 목록 -->
    <div id="results-container"></div>

    <!-- 양말 색상 추천 섹션 -->
    <section id="socks-section" class="socks-section" style="display:none;">
      <div class="socks-header">
        <h2>🧦 어울리는 양말 색상</h2>
        <p class="section-sub">TOP 1 신발 색상 기반으로 AI가 추천합니다</p>
      </div>
      <div id="socks-container"></div>

      <!-- 러닝 코디 추천 (양말 선택 후 노출) -->
      <div id="outfit-section" style="display:none;">
        <div class="socks-header" style="margin-top:24px;">
          <h2>👕 러닝 코디 추천</h2>
          <p class="section-sub" id="outfit-sub"></p>
        </div>
        <div id="outfit-container"></div>
      </div>
    </section>

    <!-- 사이즈 가이드 링크 -->
    <div id="size-link-section" class="size-link-section" style="display:none;">
      <a href="size.html" class="btn-size-guide">📏 사이즈 변환 가이드 →</a>
    </div>

    <!-- 액션 버튼 -->
    <div class="actions">
      <button onclick="location.href='diagnosis.html'" class="btn-secondary">다시 진단하기</button>
      <button id="compare-btn" class="btn-secondary" style="display:none;">TOP 1 vs TOP 2 비교</button>
    </div>
  </main>

  <!-- TOP 비교 모달 -->
  <div id="compare-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2>상세 비교</h2>
      <div id="compare-table"></div>
    </div>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay" class="loading-overlay" style="display:none;">
    <div class="loading-content">
      <div class="spinner"></div>
      <p id="loading-message">AI가 최적의 러닝화를 찾고 있어요...</p>
    </div>
  </div>

  <!-- ✅ 개발자 테스트 패널 (localhost 전용 — 운영 환경에서 자동 숨김) -->
  <div id="dev-panel" style="
    display:none; position:fixed; bottom:16px; right:16px; z-index:9999;
    background:#1e1e2e; color:#cdd6f4; border-radius:12px; padding:16px;
    width:220px; font-size:13px; box-shadow:0 4px 20px rgba(0,0,0,0.5);
    font-family: monospace;
  ">
    <p style="margin:0 0 10px; font-weight:700; font-size:14px;">🧪 DB 상태 테스트</p>

    <label style="display:block; margin-bottom:6px; cursor:pointer;">
      <input type="radio" name="test-mode" value="normal" checked> 정상 (실제 DB)
    </label>
    <label style="display:block; margin-bottom:6px; cursor:pointer;">
      <input type="radio" name="test-mode" value="case-a"> Case A — DB 비어있음
    </label>
    <label style="display:block; margin-bottom:12px; cursor:pointer;">
      <input type="radio" name="test-mode" value="case-b"> Case B — 예산 초과 신발만
    </label>

    <button onclick="devRetest()" style="
      width:100%; padding:8px; border:none; border-radius:8px;
      background:#89b4fa; color:#1e1e2e; font-weight:700; cursor:pointer;
      font-size:13px;
    ">▶ 재테스트</button>

    <div id="dev-mode-badge" style="
      margin-top:10px; padding:6px 8px; border-radius:6px;
      background:#313244; font-size:11px; text-align:center; min-height:20px;
    "></div>
  </div>

  <footer class="footer">
    <p>powered by KAIST IMMS 이준호 · 김영권 · 박영민 · 최규민</p>
  </footer>

  <script src="result.js"></script>
</body>
</html>
