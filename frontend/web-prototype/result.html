<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunFit - 추천 결과</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 결과 페이지 헤더 (컴팩트) -->
  <header class="result-header">
    <div class="result-header-inner">
      <a href="index.html" class="result-logo">
        <svg class="logo-icon-sm" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <line x1="2" y1="18" x2="10" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
          <line x1="4" y1="24" x2="11" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
          <line x1="2" y1="30" x2="9"  y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
          <circle cx="33" cy="9" r="4.5" fill="white"/>
          <path d="M33 13.5 L27 24" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <path d="M29 18 L38 15" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <path d="M29 18 L21 22" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <path d="M27 24 L35 33 L28 40" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M27 24 L19 31" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="result-logo-text">RunFit</span>
      </a>
      <p class="result-header-sub">AI 추천 결과</p>
    </div>
  </header>

  <main class="container">
    <div class="profile-summary" id="profile-summary"></div>

    <div id="results-container"></div>

    <div class="actions">
      <button onclick="location.href='index.html'" class="btn-secondary">다시 진단하기</button>
      <button id="compare-btn" class="btn-secondary" style="display: none;">TOP 1 vs TOP 2 비교</button>
    </div>
  </main>

  <!-- 비교 모달 -->
  <div id="compare-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2>상세 비교</h2>
      <div id="compare-table"></div>
    </div>
  </div>

  <footer class="footer">
    <p>powered by KAIST IMMS 이준호 · 김영권 · 박영민 · 최규민</p>
  </footer>

  <!-- API 응답 대기 중 로딩 오버레이 -->
  <div id="loading-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:999; flex-direction:column; align-items:center; justify-content:center; gap:16px;">
    <div style="width:48px;height:48px;border:5px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <p style="color:#fff;font-size:16px;font-weight:600;">AI가 최적의 러닝화를 찾고 있어요...</p>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <script src="result.js"></script>
</body>
</html>
