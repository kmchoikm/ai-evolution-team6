<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunFit - 추천 결과</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>🏃 RunFit</h1>
    <p class="tagline">AI가 추천하신 러닝화입니다</p>
  </header>

  <main class="container">
    <div class="profile-summary" id="profile-summary"></div>

    <div id="results-container"></div>

    <div class="actions">
      <button onclick="location.href='index.html'" class="btn-secondary">다시 진단하기</button>
      <button id="compare-btn" class="btn-secondary" style="display: none;">TOP 1 vs TOP 2 비교</button>
    </div>
  </main>

  <!-- 비교 모달 -->
  <div id="compare-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2>상세 비교</h2>
      <div id="compare-table"></div>
    </div>
  </div>

  <footer class="footer">
    <p>powered by KAIST IMMS 이준호 · 김영권 · 박영민 · 최규민</p>
  </footer>

  <script src="recommend.js"></script>
  <script src="result.js"></script>
</body>
</html>
