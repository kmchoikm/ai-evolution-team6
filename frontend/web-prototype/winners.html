<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunFit - 셀럽 / 우승자 신발</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── 탭 ── */
    .tab-bar {
      display: flex;
      background: white;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: transparent;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-light);
      transition: all 0.12s;
      font-family: inherit;
    }
    .tab-btn.active { background: var(--primary); color: white; }

    /* ── 섹션 컨테이너 ── */
    .tab-section { display: none; }
    .tab-section.active { display: block; }

    /* ── 셀럽 그리드 ── */
    .celeb-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .celeb-card {
      background: white;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.12s;
    }
    .celeb-card:hover  { border-color: #aaaaaa; background: #fafafa; }
    .celeb-card.active { border-color: var(--primary); border-width: 2px; background: var(--primary-light); }
    .celeb-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #111111;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-weight: 700;
    }
    .celeb-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.2px; }
    .celeb-type-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f5f5f5;
      color: var(--text-light);
    }
    .type-athlete    { background: #e3f2fd; color: #1565c0; }
    .type-actor      { background: #f3e5f5; color: #6a1b9a; }
    .type-influencer { background: #e8f5e9; color: #2e7d32; }
    .type-youtuber   { background: #ffebee; color: #c62828; }

    /* ── 셀럽 신발 상세 ── */
    .celeb-shoe-detail {
      background: white;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
    }
    .celeb-shoe-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .celeb-avatar-lg {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #111111;
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── 우승자 카드 ── */
    .winner-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .winner-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .winner-race { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }
    .winner-year { font-size: 11px; color: var(--text-light); background: var(--primary-light); padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .winner-info { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .winner-chip {
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 4px;
      background: var(--primary-light);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .winner-time { font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }

    /* ── 필터 바 ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 6px 13px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: white;
      transition: all 0.12s;
      white-space: nowrap;
      font-family: inherit;
    }
    .filter-chip.active { border-color: var(--primary); border-width: 1.5px; background: var(--primary-light); color: var(--text); font-weight: 700; }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .celeb-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .celeb-card { padding: 12px 6px; }
      .celeb-avatar { width: 48px; height: 48px; font-size: 18px; }
      .celeb-name { font-size: 12px; }
    }
    @media (max-width: 360px) {
      .celeb-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>⭐ 셀럽 / 우승자 신발</h1>
    <p class="tagline">그들이 선택한 러닝화를 확인하세요</p>
  </header>

  <main class="container">

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-celeb"   onclick="switchTab('celeb')">⭐ 셀럽 착용</button>
      <button class="tab-btn"        id="tab-winners" onclick="switchTab('winners')">🏅 대회 우승자</button>
    </div>

    <!-- ── 셀럽 탭 ── -->
    <div id="section-celeb" class="tab-section active">

      <!-- 타입 필터 -->
      <div class="filter-bar" id="celeb-filters">
        <button class="filter-chip active" onclick="filterCelebs('all', this)">전체</button>
        <button class="filter-chip" onclick="filterCelebs('athlete', this)">🏃 선수</button>
        <button class="filter-chip" onclick="filterCelebs('actor', this)">🎬 배우</button>
        <button class="filter-chip" onclick="filterCelebs('influencer', this)">📸 인플루언서</button>
        <button class="filter-chip" onclick="filterCelebs('youtuber', this)">▶️ 유튜버</button>
      </div>

      <div id="celeb-grid" class="celeb-grid"></div>

      <!-- 선택된 셀럽 신발 상세 -->
      <div id="celeb-detail" style="display:none;"></div>
    </div>

    <!-- ── 우승자 탭 ── -->
    <div id="section-winners" class="tab-section">

      <!-- 대회명 필터 -->
      <div id="winner-filters" class="filter-bar"></div>

      <div id="winners-list"></div>
    </div>

  </main>

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay" class="loading-overlay" style="display:none;">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>데이터를 불러오고 있어요...</p>
    </div>
  </div>

  <footer class="footer">
    <p>powered by KAIST IMMS 이준호 · 김영권 · 박영민 · 최규민</p>
  </footer>

  <script src="winners.js"></script>
</body>
</html>
